<div class="container-grid viewMenuComplet">

  <div class="grid-header">
    <h1 class="title"> Asignación de Visitas</h1>
  </div>

  <div class="mt-4" style="margin-bottom: 1.5rem;">
    <app-modal-search-asg-visitas (setDataFiltro)="addFilter($event)"></app-modal-search-asg-visitas>
  </div>

  @if(asgvisita | async; as result){
  <div class="mt-4">
    <app-table-asg-visitas [dataSource]="result" (sendDataPagination)="addPagination($event)"></app-table-asg-visitas>
  </div>
  }
</div>
