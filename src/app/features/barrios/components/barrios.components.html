<div class="container-grid viewMenuComplet">

  <div class="grid-header">
    <h1 class="title">Barrios</h1>
  </div>

  <div class="mt-4" style="margin-bottom: 1.5rem;">
    <app-modal-search-barrios (setDataFiltro)="addFilter($event)"></app-modal-search-barrios>
  </div>

  @if(barrios | async; as result){
  <div class="mt-4">
    <app-table-barrios [dataSource]="result" (sendDataPagination)="addPagination($event)"></app-table-barrios>
  </div>
  }
</div>
