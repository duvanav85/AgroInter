<div class="p-3 modal-container">
  @if (isModal) {
    <div class="header-modal">
      <h3>{{ getTitle() }}</h3>
      <mat-icon class="mat-icon-close-modal" (click)="close()">close</mat-icon>
    </div>
  }

  <div class="separator"></div>

  <div class="accordion-form">
    <form [formGroup]="myForm" autocomplete="off">
      <div class="mt-3 mb-5">
        <mat-accordion class="example-headers-align" multi>
          <mat-expansion-panel [expanded]="true" [hideToggle]="true" disabled>
            <mat-expansion-panel-header>
              <mat-panel-title>
                <strong>Departamentos</strong>
              </mat-panel-title>
            </mat-expansion-panel-header>

            <div class="form-fields">

              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Departamento</mat-label>
                  <input matInput formControlName="departamentoid">
                </mat-form-field>
              </div>

              <div class="form-field full-width">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Código</mat-label>
                  <input matInput formControlName="codigo">
                </mat-form-field>
              </div>

              <div class="form-field full-width">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Pais</mat-label>
                  <input matInput formControlName="idpais">
                </mat-form-field>
              </div>

              <!-- @if (editMode) { -->
              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Nombre Departamento</mat-label>
                  <input matInput formControlName="departamento">
                </mat-form-field>
              </div>

              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Estado</mat-label>
                  <mat-select formControlName="activo">
                    <mat-option value="true">Activo</mat-option>
                    <mat-option value="false">Inactivo</mat-option>
                  </mat-select>
                </mat-form-field>
              </div>
              <!-- } -->
            </div>

            <div class="text-right">
              <button type="button" mat-flat-button color="primary" class="wtotal"
                (click)="createUpdateCause()" [disabled]="myForm.invalid">
                <mat-icon>save</mat-icon>
                Guardar
              </button>
            </div>
          </mat-expansion-panel>
        </mat-accordion>
      </div>
    </form>
  </div>
</div>
