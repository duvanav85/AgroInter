<div class="container-grid viewMenuComplet">

  <div class="grid-header">
    <h1 class="title">Departamentos</h1>
  </div>

  <div class="mt-4" style="margin-bottom: 1.5rem;">
    <app-modal-search-departamentos (setDataFiltro)="addFilter($event)"></app-modal-search-departamentos>
  </div>

  @if(departamentos | async; as result){
  <div class="mt-4">
    <app-table-departamentos [dataSource]="result" (sendDataPagination)="addPagination($event)"></app-table-departamentos>
  </div>
  }
</div>
