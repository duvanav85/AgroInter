<div class="p-3 modal-container">
  @if (isModal) {
    <div class="header-modal">
        <h3>{{ getTitle() }}</h3>
        <mat-icon class="mat-icon-close-modal" (click)="close()">close</mat-icon>
    </div>
  }

  <div class="separator"></div>

  <div class="accordion-form">
    <form [formGroup]="myForm" autocomplete="off">
      <div class="mt-3 mb-5">
        <mat-accordion class="example-headers-align" multi>
          <mat-expansion-panel [expanded]="true" [hideToggle]="true" disabled>
            <mat-expansion-panel-header>
              <mat-panel-title>
                <strong>Detalle Parametros</strong>
              </mat-panel-title>
            </mat-expansion-panel-header>

            <div class="form-fields">
              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Parámetro</mat-label>
                  <input matInput formControlName="parametro">
                </mat-form-field>
              </div>
              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label></mat-label>
                  <mat-label>Registro</mat-label>
                  <input matInput formControlName="idregistro">
                </mat-form-field>
              </div>
            </div>

            <div class="form-fields">
              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Nombre Detalle</mat-label>
                  <input matInput formControlName="descripcion">
                </mat-form-field>
              </div>
              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Activo</mat-label>
                  <input matInput formControlName="activo">
                </mat-form-field>
              </div>
            </div>

            <div class="text-right">
              <button type="submit" class="btn btn-primary me-1 mb-1"
              (click)="createUpdatedetalleParametros()" [disabled]="myForm.invalid">
              <i class="bi bi-pencil-square"></i>
              Guardar
              </button>
            </div>
          </mat-expansion-panel>
        </mat-accordion>
      </div>
    </form>
  </div>
</div>
