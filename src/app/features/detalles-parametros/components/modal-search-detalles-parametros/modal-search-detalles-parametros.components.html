<mat-accordion class="example-headers-align" multi>
  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title>
        Búsqueda Avanzada
      </mat-panel-title>
    </mat-expansion-panel-header>

    <mat-card class="classCardFilter">
      <mat-card-content>
        <form [formGroup]="myForm" autocomplete="off">
          <div>
            <mat-form-field appearance="outline" class="classCardFilter-input">
              <mat-label>
                Parámetro
              </mat-label>
              <input matInput formControlName="idparametro">
            </mat-form-field>

            <mat-form-field appearance="outline" class="classCardFilter-input">
              <mat-label>
                Registro
              </mat-label>
              <input matInput formControlName="idregistro">
            </mat-form-field>

            <mat-form-field appearance="outline" class="classCardFilter-input">
              <mat-label>
                Descripcion
              </mat-label>
              <input matInput formControlName="descripcion">
            </mat-form-field>

            <mat-form-field appearance="outline" class="classCardFilter-input">
              <mat-label>
                Activo
              </mat-label>
              <input matInput formControlName="activo">
            </mat-form-field>
          </div>

          <div class="button-container">
            <button (click)="clearSearch()" type="button" mat-flat-button color="primary">
              <mat-icon>delete</mat-icon>
              Limpiar
            </button>

            <button (click)="advancedSearch()" type="button" mat-flat-button color="primary">
              <mat-icon>search</mat-icon>
              Buscar
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </mat-expansion-panel>
</mat-accordion>


<div class="table-buttons">
  <button mat-flat-button color="primary" (click)="addAirport()">
    <mat-icon>add</mat-icon>
    Crear
  </button>
  <button mat-flat-button color="primary" (click)="downloadData()">
    <mat-icon>download</mat-icon>
    Descargar
  </button>
</div>
