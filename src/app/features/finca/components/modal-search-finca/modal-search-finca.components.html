<mat-accordion class="example-headers-align" multi>
  <mat-expansion-panel>
      <mat-expansion-panel-header>
          <mat-panel-title>
            Búsqueda Avanzada
          </mat-panel-title>
      </mat-expansion-panel-header>

      <mat-card class="classCardFilter">
          <mat-card-content>
              <form [formGroup]="myForm" autocomplete="off">
                  <div>
                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Identificacion
                          </mat-label>
                          <input matInput formControlName="identificacion">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Nombre Propietario
                          </mat-label>
                          <input matInput formControlName="nombre_propietario">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                              Municipio
                          </mat-label>
                          <input matInput formControlName="idMunicipio">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Vereda
                          </mat-label>
                          <input matInput formControlName="vereda">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Numero de Arboles
                          </mat-label>
                          <input matInput formControlName="nro_Arboles">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Registro ICA
                          </mat-label>
                          <input matInput formControlName="registro_ICA">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Gobal GAP
                          </mat-label>
                          <input matInput formControlName="gobal_Gap">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Rainforest
                          </mat-label>
                          <input matInput formControlName="rainforest">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Certificado XX
                          </mat-label>
                          <input matInput formControlName="certificadoXX">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Ciudad
                          </mat-label>
                          <input matInput formControlName="idciudad">
                      </mat-form-field>

                      <mat-form-field appearance="outline" class="classCardFilter-input">
                          <mat-label>
                             Certificado YY
                          </mat-label>
                          <input matInput formControlName="certificadoYY">
                      </mat-form-field>

                    </div>

                  <div class="button-container">
                      <button type="button" mat-flat-button color="primary" (click)="clearSearch()">
                        <mat-icon>delete</mat-icon>
                        Limpiar
                      </button>

                      <button type="button" mat-flat-button color="primary" (click)="advancedSearch()" >
                          <mat-icon>search</mat-icon>
                        Buscar
                      </button>
                  </div>
              </form>
          </mat-card-content>
      </mat-card>
  </mat-expansion-panel>
</mat-accordion>

<div class="table-buttons">
  <button mat-flat-button color="primary" (click)="addCause()">
    <mat-icon>add</mat-icon>
     Crear
  </button>
  <button mat-flat-button color="primary" (click)="downloadData()">
    <mat-icon>download</mat-icon>
    Descargar
  </button>
</div>
