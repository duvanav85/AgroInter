<mat-accordion class="example-headers-align" multi>
  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title>
        Búsqueda Avanzada
      </mat-panel-title>
    </mat-expansion-panel-header>

    <mat-card class="classCardFilter">
      <mat-card-content>
        <form [formGroup]="myForm" autocomplete="off">
          <div>

            <mat-form-field appearance="outline" class="classCardFilter-input">
              <mat-label>Parametros</mat-label>
              <mat-select #parametros formControlName="parametro">
                @for (dta of dataSource.data; track dta) {
                  <mat-option [value]="dta.parametro">{{ dta.nombreParametro }}</mat-option>
                }
              </mat-select>
            </mat-form-field>
              @if (parametros.value) {
              <mat-form-field appearance="outline" class="classCardFilter-input">
                <mat-label>
                  Nombre Parametro
                </mat-label>
                <input matInput formControlName="nombreParametro">
              </mat-form-field>

              } @else {
              <mat-form-field appearance="outline" class="classCardFilter-input">
                <mat-label>
                  Nombre Parametro
                </mat-label>
                <input matInput [disabled]="true" matTooltip="Debe seleccionar primero un valor para parametro" [matTooltipPosition]="'above'">
              </mat-form-field>
              }

          </div>

          <div class="button-container">
            <button type="button" mat-flat-button color="primary" (click)="clearSearch()">
              <mat-icon>delete</mat-icon>
              Limpiar
            </button>

            <button type="button" mat-flat-button color="primary" (click)="advancedSearch()" >
              <mat-icon>search</mat-icon>
              Buscar
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </mat-expansion-panel>
</mat-accordion>

<div class="table-buttons">
  <button mat-flat-button color="primary" (click)="addParametros()">
    <mat-icon>add</mat-icon>
    Crear
  </button>
  <button mat-flat-button color="primary" (click)="getParametrosDownload()">
    <mat-icon>download</mat-icon>
    Descargar
  </button>
</div>
