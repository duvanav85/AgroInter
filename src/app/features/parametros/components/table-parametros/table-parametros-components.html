<mat-card class="result-card">
  <mat-card-header>
    <mat-card-title class="result-card__title">Resultados</mat-card-title>
  </mat-card-header>
  <mat-card-content class="result-card__content">
    @if (dataSource.data && dataSource.data.length > 0) {
    <div class="result-card__container mat-elevation-z8">
      <table class="result-card__table" mat-table [dataSource]="dataSource.data" matSort
       aria-describedby="TableClasses">
        <ng-container matColumnDef="actions">
          <th class="result-card__header" mat-header-cell *matHeaderCellDef mat-sort-header>
            Acción
          </th>
          <td class="result-card__cell" mat-cell *matCellDef="let row" (click)="editParametros(row)">
            <mat-icon class="result-card__icon">edit</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="parametro">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            Parametro
          </th>
          <td mat-cell *matCellDef="let row">
            {{ getParametroName(row.parametro) }}
          </td>
        </ng-container>

        <ng-container matColumnDef="nombreParametro">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            Nombre Parametro
          </th>
          <td mat-cell *matCellDef="let row">
            {{ row.nombreParametro?.toUpperCase() }}
          </td>
        </ng-container>

        <tr class="result-card__row" mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr class="result-card__row" mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <mat-paginator class="result-card__paginator" #paginator showFirstLastButtons [length]="dataSource.totalItems"
        [pageIndex]="dataSource.pageNumber!-1" [pageSize]="dataSource.pageSize"
        [pageSizeOptions]="opPag.pageSizeOptions" (page)="pageChanged($event)">
      </mat-paginator>
    </div>
    }
    @if (!dataSource.data || dataSource.data.length === 0) {
    <div>
      <p class="result-card__empty-message">
        No hay registros disponibles.
      </p>
    </div>
    }
  </mat-card-content>
</mat-card>
