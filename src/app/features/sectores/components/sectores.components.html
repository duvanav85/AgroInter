<div class="container-grid viewMenuComplet">

  <div class="grid-header">
    <h1 class="title">Sectores</h1>
  </div>

  <div class="mt-4" style="margin-bottom: 1.5rem;">
    <app-modal-search-sectores (setDataFiltro)="addFilter($event)"></app-modal-search-sectores>
  </div>

  @if(sectores | async; as result){
  <div class="mt-4">
    <app-table-sectores [dataSource]="result" (sendDataPagination)="addPagination($event)"></app-table-sectores>
  </div>
  }
</div>
