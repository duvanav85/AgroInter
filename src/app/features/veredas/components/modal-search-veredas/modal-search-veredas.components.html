<mat-accordion class="example-headers-align" multi>
  <mat-expansion-panel>
      <mat-expansion-panel-header>
          <mat-panel-title>
            Búsqueda Avanzada
          </mat-panel-title>
      </mat-expansion-panel-header>

      <mat-card class="classCardFilter">
          <mat-card-content>
            <form [formGroup]="myForm" autocomplete="off">
              <div>
                <mat-form-field appearance="outline" class="classCardFilter-input">
                    <mat-label>
                        Vereda
                    </mat-label>
                    <input matInput formControlName="nombre_vereda">
                </mat-form-field>

                <mat-form-field appearance="outline" class="classCardFilter-input">
                    <mat-label>
                        Departamento
                    </mat-label>
                    <mat-select formControlName="iddepartamento">
                    <mat-option value="1">Atlantico</mat-option>
                    <mat-option value="2">Antioquia</mat-option>
                    <mat-option value="3">Cundinamarca</mat-option>
                  </mat-select>
                </mat-form-field>

                <mat-form-field appearance="outline" class="classCardFilter-input">
                    <mat-label>
                        Ciudad
                    </mat-label>
                    <mat-select formControlName="idciudad">
                    <mat-option value="1">Cartagena</mat-option>
                    <mat-option value="2">Medellin</mat-option>
                    <mat-option value="3">Bogota</mat-option>
                  </mat-select>
                </mat-form-field>

                <mat-form-field appearance="outline" class="classCardFilter-input">
                    <mat-label>
                        Área (ha)
                    </mat-label>
                    <input matInput formControlName="area_ha">
                </mat-form-field>

                <mat-form-field appearance="outline" class="classCardFilter-input">
                    <mat-label>
                        Población
                    </mat-label>
                    <input matInput formControlName="poblacion">
                </mat-form-field>
              </div>

              <div class="button-container">
                <button type="button" mat-flat-button color="primary" (click)="clearSearch()">
                  <mat-icon>delete</mat-icon>
                  Limpiar
                </button>

                <button type="button" mat-flat-button color="primary" (click)="advancedSearch()" >
                    <mat-icon>search</mat-icon>
                  Buscar
                </button>
              </div>
            </form>
          </mat-card-content>
      </mat-card>
  </mat-expansion-panel>
</mat-accordion>

<div class="table-buttons">
  <button mat-flat-button color="primary" (click)="addCause()">
    <mat-icon>add</mat-icon>
     Crear
  </button>
  <button mat-flat-button color="primary" (click)="downloadData()">
    <mat-icon>download</mat-icon>
    Descargar
  </button>
</div>
