<div class="p-3 modal-container">
  @if (isModal) {
    <div class="header-modal">
      <h3>{{ getTitle() }}</h3>
      <mat-icon class="mat-icon-close-modal" (click)="close()">close</mat-icon>
    </div>
  }

  <div class="separator"></div>

  <div class="accordion-form">
    <form [formGroup]="myForm" autocomplete="off">
      <div class="mt-3 mb-5">
        <mat-accordion class="example-headers-align" multi>
          <mat-expansion-panel [expanded]="true" [hideToggle]="true" disabled>
            <mat-expansion-panel-header>
              <mat-panel-title>
                <strong>Veredas</strong>
              </mat-panel-title>
            </mat-expansion-panel-header>

            <div class="form-fields">

              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Vereda</mat-label>
                  <input matInput formControlName="nombre_vereda">
                </mat-form-field>
              </div>

              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Departamento</mat-label>
                  <mat-select formControlName="iddepartamento">
                    <mat-option value="1">Atlantico</mat-option>
                    <mat-option value="2">Antioquia</mat-option>
                    <mat-option value="3">Cundinamarca</mat-option>
                  </mat-select>
                </mat-form-field>
              </div>

              <div class="form-field">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Ciudad</mat-label>
                  <mat-select formControlName="idciudad">
                    <mat-option value="1">Medellín</mat-option>
                    <mat-option value="2">Rionegro</mat-option>
                    <mat-option value="3">Bogotá</mat-option>
                    <mat-option value="4">Cali</mat-option>
                  </mat-select>
                </mat-form-field>
              </div>

              <div class="form-field full-width">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Área (ha)</mat-label>
                  <input matInput formControlName="area_ha">
                </mat-form-field>
              </div>

               <div class="form-field full-width">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Población</mat-label>
                  <input matInput formControlName="poblacion">
                </mat-form-field>
              </div>
            </div>

            <div class="text-right">
              <button type="button" mat-flat-button color="primary" class="wtotal"
                (click)="createUpdateCause()" [disabled]="myForm.invalid">
                <mat-icon>save</mat-icon>
                Guardar
              </button>
            </div>
          </mat-expansion-panel>
        </mat-accordion>
      </div>
    </form>
  </div>
</div>
