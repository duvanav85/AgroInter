<div class="container-grid viewMenuComplet">

  <div class="grid-header">
    <h1 class="title">Visitas</h1>
  </div>

  <div class="mt-4" style="margin-bottom: 1.5rem;">
    <app-modal-search-visita (setDataFiltro)="addFilter($event)"></app-modal-search-visita>
  </div>

  @if(visita | async; as result){
  <div class="mt-4">
    <app-table-visita [dataSource]="result" (sendDataPagination)="addPagination($event)"></app-table-visita>
  </div>
  }
</div>
