<div class="container-grid viewMenuComplet">

  <div class="grid-header">
    <h1 class="title">Zonas</h1>
  </div>

  <div class="mt-4" style="margin-bottom: 1.5rem;">
    <app-modal-search-zonas (setDataFiltro)="addFilter($event)"></app-modal-search-zonas>
  </div>

  @if(zonas | async; as result){
  <div class="mt-4">
    <app-table-zonas [dataSource]="result" (sendDataPagination)="addPagination($event)"></app-table-zonas>
  </div>
  }
</div>
